<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Test Virtualized Diagram Module 2 (attempt2 logic)</title>
    <!-- Load GoJS and the ScrollingTable extension first -->
    <script src="https://unpkg.com/gojs/release/go.js"></script>
    <script src="ScrollingTable.js"></script>

    <!-- Use Import Map to resolve project-specific dependencies to our local mock file -->
    <script type="importmap">
    {
        "imports": {
            "../link/LinkEventHandler": "./mock_dependencies.js",
            "../constants/ColorConstants": "./mock_dependencies.js",
            "../hooks/useDiagram": "./mock_dependencies.js",
            "../node/NodeService": "./mock_dependencies.js",
            "../canvas/CanvasService": "./mock_dependencies.js",
            "../constants/NodeConstants": "./mock_dependencies.js",
            "../constants/TransactionConstants": "./mock_dependencies.js",
            "../../../services/CMStoreService": "./mock_dependencies.js",
            "../../../Redux/store/CMStoreConstant": "./mock_dependencies.js",
            "../../../Redux/constants/CMStoreConstants": "./mock_dependencies.js"
        }
    }
    </script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #myDiagramDiv {
            width: 100%;
            height: 100%;
        }

        #saveBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background-color: #3333ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: background 0.2s;
        }

        #saveBtn:hover {
            background-color: #1dcaf9;
        }
    </style>
</head>

<body>

    <div id="myDiagramDiv"></div>
    <button id="saveBtn">Save & Log State</button>

    <script type="module">
        import InitDiagram, { globalNodeState } from './InitDiagramVirtualized2.js';

        // 1. Initialize the Diagram
        const diagram = InitDiagram({ linkPresent: true });
        diagram.div = document.getElementById("myDiagramDiv");

        // 2. Data Preparation Helper
        function generateAttributes(prefix, count) {
            const arr = [];
            for (let i = 1; i <= count; i++) {
                arr.push({
                    name: prefix + "_col_" + i,
                    type: Math.random() > 0.5 ? "number" : "string"
                });
            }
            return arr;
        }

        function prepareNodeData(n) {
            const full = n.fullItems || [];
            n.id = n.key; // For getOrCreateNodeState compatibility
            n.isVirtualized = (full.length > 200);
            n.indexMap = new Map();
            full.forEach((item, idx) => n.indexMap.set(item, idx));
            n.startIndex = 0;
            n.visibleItems = []; // Initial items filled by InitialLayoutCompleted updateWindow
            
            // Initial size logic from attempt2.html
            const contentH = full.length * 26 + 34; // ROW_HEIGHT=26, BUTTONS_H=34
            if (!n.isVirtualized && contentH < 300) {
                n.size = go.Size.stringify(new go.Size(250, contentH + 2));
            } else {
                n.size = go.Size.stringify(new go.Size(250, 300));
            }
            
            return n;
        }

        function enableInitialFilters(nodeDataArray) {
            nodeDataArray.forEach(n => {
                const full = n.fullItems || [];
                const state = {
                    activeFilters: new Set()
                };
                globalNodeState.set(n.key, state);

                // 1. Common: Rows 6 and 7 (indices 5, 6) for all nodes
                [5, 6].forEach(idx => {
                    if (full[idx]) state.activeFilters.add(full[idx].name);
                });

                // 2. Node-specific variety
                const variety = {
                    "Products": [0, 10, 20],
                    "Suppliers": [2, 12, 22],
                    "Store": [4, 14, 24],
                    "Inventory": [8, 18, 28]
                };
                (variety[n.key] || []).forEach(idx => {
                    if (full[idx]) state.activeFilters.add(full[idx].name);
                });
            });
        }

        function exportState() {
            const exported = {};
            globalNodeState.forEach((state, key) => {
                exported[key] = Array.from(state.activeFilters);
            });
            console.log("Current Filter State (attempt2 logic):", exported);
            alert("State exported to browser console!\nCheck console for details.");
        }

        document.getElementById("saveBtn").onclick = exportState;

        // 3. Define Test Data (matches attempt2.html exactly)
        const nodeDataArray = [
            prepareNodeData({ key: "Products", fullItems: generateAttributes("products", 3000), loc: "0 0" }),
            prepareNodeData({ key: "Suppliers", fullItems: generateAttributes("suppliers", 1500), loc: "400 0" }),
            prepareNodeData({ key: "Store", fullItems: generateAttributes("store", 50), loc: "800 0" }),
            prepareNodeData({ key: "Warehouse", fullItems: generateAttributes("warehouse", 3), loc: "0 400" }),
            prepareNodeData({ key: "Inventory", fullItems: generateAttributes("inv", 3000), loc: "400 400" })
        ];

        const linkDataArray = [
            { from: "Products", fromPort: "products_col_5", to: "Inventory", toPort: "inv_col_10", key: "L1" },
            { from: "Suppliers", fromPort: "suppliers_col_10", to: "Inventory", toPort: "inv_col_20", key: "L2" },
            { from: "Store", fromPort: "store_col_15", to: "Inventory", toPort: "inv_col_30", key: "L3" },
            { from: "Warehouse", fromPort: "warehouse_col_2", to: "Inventory", toPort: "inv_col_40", key: "L4" }
        ];

        // 4. Load Model
        enableInitialFilters(nodeDataArray);
        diagram.model.nodeDataArray = nodeDataArray;
        diagram.model.linkDataArray = linkDataArray;

        // Make it easier to access from console
        window.myDiagram = diagram;
    </script>
</body>

</html>
