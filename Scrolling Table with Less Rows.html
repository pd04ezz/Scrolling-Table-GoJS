<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Less Rows</title>

<script src="https://cdn.jsdelivr.net/npm/gojs@3.1.7/release/go.js"></script>
<script src="ScrollingTable.js"></script>

<style>
#myDiagramDiv{
width:1100px;
height:600px;
border:1px solid black;
}
</style>
</head>

<body>

<div id="myDiagramDiv"></div>

<script>

const $ = go.GraphObject.make;

const diagram =
$(go.Diagram,"myDiagramDiv",
{ "undoManager.isEnabled":true });

diagram.nodeTemplate =
$(go.Node,"Vertical",

$(go.TextBlock,
{font:"bold 15px sans-serif", margin:5},
new go.Binding("text","key")
),

$(go.Panel,"Auto",

$(go.Shape,{fill:"white"}),

$("ScrollingTable",
{
name:"SCROLLER",
desiredSize:new go.Size(260,180)
},

new go.Binding("TABLE.itemArray","items"),

{
"TABLE.itemTemplate":

$(go.Panel,"TableRow",
{
defaultStretch:go.Stretch.Horizontal,
fromSpot:go.Spot.Right,
toSpot:go.Spot.Left,
fromLinkable:true,
toLinkable:true
},

new go.Binding("portId","name"),

$(go.TextBlock,
{column:0, margin:3, width:160},
new go.Binding("text","name")
),

$(go.TextBlock,
{column:1, margin:3, stroke:"#555"},
new go.Binding("text","value")
)

)
}

)

)

);


diagram.linkTemplate =
$(go.Link,
  {
    routing: go.Link.AvoidsNodes,
    corner: 4,

    relinkableFrom: true,
    relinkableTo: true,

    reshapable: true,
    resegmentable: true,

    adjusting: go.Link.Stretch,

    selectionAdorned: true
  },

  $(go.Shape,
    { strokeWidth: 2 }
  ),

  $(go.Shape,
    { toArrow: "Standard" }
  )

);

diagram.toolManager.doMouseWheel = function() {

  const e = diagram.lastInput;
  const node = diagram.findPartAt(e.documentPoint);

  if (!node) return;

  const table = node.findObject("TABLE");
  if (!table) return;

  const panel = table.panel;

  if (panel && panel._scrollTable) {

    if (e.delta > 0) {
      panel._scrollTable(table, -1);
    } else {
      panel._scrollTable(table, 1);
    }

    panel._updateScrollBar(table);
  }

};



// ------- ATTRIBUTE GENERATOR -------

function generateAttributes(prefix,count){

const types = ["int","varchar","datetime","decimal","boolean"];

let arr = [];

for(let i=1;i<=count;i++){

arr.push({
name: prefix+"_col_"+i,
value: types[i % types.length]
});

}

return arr;
}



// ------- MODEL -------

diagram.model = new go.GraphLinksModel({

linkFromPortIdProperty:"fromPort",
linkToPortIdProperty:"toPort",

nodeDataArray:[

{
key:"Customers",
items: generateAttributes("customer",300)
},

{
key:"Orders",
items: generateAttributes("order",300)
}

],

linkDataArray:[

{from:"Customers", fromPort:"customer_col_1", to:"Orders", toPort:"order_col_2"},
{from:"Customers", fromPort:"customer_col_5", to:"Orders", toPort:"order_col_10"},
{from:"Customers", fromPort:"customer_col_20", to:"Orders", toPort:"order_col_50"},
{from:"Customers", fromPort:"customer_col_30", to:"Orders", toPort:"order_col_60"},
{from:"Customers", fromPort:"customer_col_70", to:"Orders", toPort:"order_col_120"},
{from:"Customers", fromPort:"customer_col_90", to:"Orders", toPort:"order_col_150"},
{from:"Customers", fromPort:"customer_col_120", to:"Orders", toPort:"order_col_180"},
{from:"Customers", fromPort:"customer_col_200", to:"Orders", toPort:"order_col_210"},
{from:"Customers", fromPort:"customer_col_250", to:"Orders", toPort:"order_col_260"}

]

});

</script>

</body>
</html>
