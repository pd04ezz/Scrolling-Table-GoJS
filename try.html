<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/gojs/release/go.js"></script>
<script src="ScrollingTable.js"></script>
</head>

<body>

<div id="myDiagramDiv" style="width:100%;height:700px;border:1px solid black;"></div>

<script>

const $ = go.GraphObject.make;

const diagram =
$(go.Diagram,"myDiagramDiv",
{ "undoManager.isEnabled":true });

/* ---------------- CONFIG ---------------- */

const BUFFER_BEFORE = 100;
const BUFFER_AFTER = 100;
const VISIBLE = 60;
const SHIFT = 40;

/* ---------------- NODE TEMPLATE ---------------- */

diagram.nodeTemplate =
$(go.Node,"Vertical",

$(go.TextBlock,
{font:"bold 15px sans-serif", margin:5},
new go.Binding("text","key")
),

$(go.Panel,"Auto",

$(go.Shape,{fill:"white"}),

$("ScrollingTable",
{
name:"SCROLLER",
desiredSize:new go.Size(260,180)
},

new go.Binding("TABLE.itemArray","visibleItems"),

{
"TABLE.itemTemplate":

$(go.Panel,"TableRow",
{
defaultStretch:go.Stretch.Horizontal,
fromSpot:go.Spot.Right,
toSpot:go.Spot.Left,
fromLinkable:true,
toLinkable:true
},

new go.Binding("portId","name"),

$(go.TextBlock,
{column:0, margin:3, width:160},
new go.Binding("text","name")
),

$(go.TextBlock,
{column:1, margin:3, stroke:"#555"},
new go.Binding("text","value")
)

)
}

)

)

);

/* ---------------- LINK TEMPLATE ---------------- */

diagram.linkTemplate =
$(go.Link,
{
routing: go.Link.AvoidsNodes,
corner: 4,
relinkableFrom: true,
relinkableTo: true
},

$(go.Shape,{ strokeWidth:2 }),
$(go.Shape,{ toArrow:"Standard" })

);

/* ---------------- ATTRIBUTE GENERATOR ---------------- */

function generateAttributes(prefix,count){

const types = ["int","varchar","datetime","decimal","boolean"];

let arr = [];

for(let i=1;i<=count;i++){

arr.push({
name: prefix+"_col_"+i,
value: types[i % types.length]
});

}

return arr;

}

/* ---------------- WINDOW LOADER ---------------- */

function updateVisibleItems(nodeData, centerIndex){

const full = nodeData.fullItems;

if(full.length <= 300){

nodeData.visibleItems = full;
nodeData.startIndex = 0;
return;

}

const start = Math.max(0,centerIndex - BUFFER_BEFORE);
const end = Math.min(full.length,centerIndex + VISIBLE + BUFFER_AFTER);

nodeData.startIndex = start;
nodeData.visibleItems = full.slice(start,end);

}

/* ---------------- SCROLL HANDLER ---------------- */

diagram.toolManager.doMouseWheel = function(){

const e = diagram.lastInput;

const node = diagram.findPartAt(e.documentPoint);

if(!node) return;

const data = node.data;

const table = node.findObject("TABLE");

if(!table) return;

const panel = table.panel;

/* native scrolling */

if(panel && panel._scrollTable){

if(e.delta > 0) panel._scrollTable(table,-1);
else panel._scrollTable(table,1);

panel._updateScrollBar(table);

}

/* virtualization */

if(data.fullItems.length <= 300) return;

const topIndex = table.topIndex;
const visibleCount = data.visibleItems.length;

/* bottom buffer */

if(topIndex > visibleCount - 80){

const newCenter = data.startIndex + topIndex + SHIFT;

if(newCenter < data.fullItems.length){

diagram.model.startTransaction("shiftDown");

updateVisibleItems(data,newCenter);

diagram.model.updateTargetBindings(data);

diagram.model.commitTransaction("shiftDown");

}

}

/* top buffer */

if(topIndex < 20){

const newCenter = data.startIndex + topIndex - SHIFT;

if(newCenter > 0){

diagram.model.startTransaction("shiftUp");

updateVisibleItems(data,newCenter);

diagram.model.updateTargetBindings(data);

diagram.model.commitTransaction("shiftUp");

}

}

};

/* ---------------- MODEL ---------------- */

const nodeDataArray = [

{
key:"Customers",
fullItems: generateAttributes("customer",3000),
visibleItems:[],
startIndex:0
},

{
key:"Orders",
fullItems: generateAttributes("order",3000),
visibleItems:[],
startIndex:0
}

];

/* initialize window */

nodeDataArray.forEach(n => updateVisibleItems(n,0));

diagram.model = new go.GraphLinksModel({

linkFromPortIdProperty:"fromPort",
linkToPortIdProperty:"toPort",

nodeDataArray: nodeDataArray,

linkDataArray:[

{from:"Customers", fromPort:"customer_col_1", to:"Orders", toPort:"order_col_2"},
{from:"Customers", fromPort:"customer_col_5", to:"Orders", toPort:"order_col_10"},
{from:"Customers", fromPort:"customer_col_20", to:"Orders", toPort:"order_col_50"},
{from:"Customers", fromPort:"customer_col_30", to:"Orders", toPort:"order_col_60"},
{from:"Customers", fromPort:"customer_col_70", to:"Orders", toPort:"order_col_120"},
{from:"Customers", fromPort:"customer_col_90", to:"Orders", toPort:"order_col_150"},
{from:"Customers", fromPort:"customer_col_120", to:"Orders", toPort:"order_col_180"},
{from:"Customers", fromPort:"customer_col_200", to:"Orders", toPort:"order_col_210"},
{from:"Customers", fromPort:"customer_col_250", to:"Orders", toPort:"order_col_260"}

]

});

</script>

</body>
</html>
