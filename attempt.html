            height: 100%;

        }

            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background-color: #3333ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: background 0.2s;
        }

        #saveBtn:hover {
            background-color: #1dcaf9;
        }
    </style>
</head>

        let ROW_HEIGHT = 30; // Fixed Row Height for absolute pixel-perfection
        let BUTTONS_H = 40;  // Default for 2 buttons
        const BUTTON_SIZE = 15;
        const BUFFER = 40;

        function snapToRow(h, rowh) {
            const r = rowh || ROW_HEIGHT || 20;
            return Math.max(r, Math.round(h / r) * r);
        }

        const diagram =
            $(go.Diagram, "myDiagramDiv",
                {
                    "undoManager.isEnabled": true
                });

        const resizingTool = diagram.toolManager.resizingTool;

        // 1. OVERRIDE doActivate to stabilize detection metrics BEFORE the drag starts
        // This prevents "flicker" if row heights change slightly during rendering
        resizingTool.doActivate = function () {
            go.ResizingTool.prototype.doActivate.call(this);
            if (this.adornedObject && this.adornedObject.name === "SCROLLER") {
                const scroller = this.adornedObject;
                const table = scroller.findObject("TABLE");

                // DETECT ACCURATE METRICS ONCE AT THE START
                this._stableRowH = (table && table.elements.count > 0 && table.elt(0).actualBounds.height > 5)
                    ? table.elt(0).actualBounds.height
                    : ROW_HEIGHT;

                // SET CELL SNAPPING for GoJS to enforce integer increments during drag
                this.cell = new go.Size(1, this._stableRowH);

                // Get the total buttons height dynamically
                const bar = scroller.findObject("SCROLLBAR");
                this._stableButtonsH = 40;
            }
        };

        // 2. OVERRIDE computeResizing to snap to rows using STABLE metrics
        resizingTool.computeResizing = function (box, min, max, cell, resizable, reshape, symmetric) {
            let result = go.ResizingTool.prototype.computeResizing.call(
                this, box, min, max, cell, resizable, reshape, symmetric
            );

            if (this.adornedObject && this.adornedObject.name === "SCROLLER") {
                const rowH = this._stableRowH || ROW_HEIGHT;
                const btnH = this._stableButtonsH || BUTTONS_H;

                const MIN_ROWS = 8;

                // 🔥 HARD MIN HEIGHT (this stops visual shrinking)
                // const minHeight = snapToRow((MIN_ROWS * rowH), rowH) + BUTTONS_H;
                const minRows = Math.min(8, total);
                const minHeight = (minRows - 1) * rowH + 40; // Lock to initial starting pad
                // Snap to rows
                let snapped = snapToRow(result.height, rowH);

                // 🚫 Clamp BEFORE rendering
                result.height = Math.max(minHeight, snapped);
            }

            return result;
        };

        // 3. OVERRIDE resize to update virtualization LIVE during drag
        resizingTool.resize = function (newr) {
            go.ResizingTool.prototype.resize.call(this, newr);
            if (this.adornedObject && this.adornedObject.name === "SCROLLER") {
                const scroller = this.adornedObject;
                const node = scroller.part;
                const table = scroller.findObject("TABLE");
                if (node && node.data && node.data.isVirtualized && table) {
                    // CRITICAL: Use newr.height (the newly snapped size) instead of stale actualBounds
                    const snappedH = newr.height;
                    const metrics = getViewportMetrics(node, snappedH);
                    const currentTop = node.data.startIndex + table.topIndex;
                    const maxTop = Math.max(0, node.data.fullItems.length - metrics.capacity);

                    const isAtBottom = (currentTop > 0 && currentTop >= (node.data.prevMaxIndex || 0) - 1);
                    let targetTop = Math.min(currentTop, maxTop);
                    if (isAtBottom) targetTop = maxTop;

                    node.data.prevMaxIndex = maxTop;
                    updateWindow(node, targetTop + BUFFER);
                    node.diagram.model.updateTargetBindings(node.data);
                    table.topIndex = Math.max(0, targetTop - node.data.startIndex);

                    if (scroller._updateScrollBar) scroller._updateScrollBar(table);
                    node.invalidateConnectedLinks();
                    refreshLinksForNode(node);
                }
            }
        };

        /* ---------------- DYNAMIC VIEWPORT HELPER ---------------- */
        function getViewportMetrics(node, optH) {
            const table = node.findObject("TABLE");
            const scroller = node.findObject("SCROLLER");
            const rowh = (table && table.elements.count > 0 && table.elt(0).actualBounds.height > 5) ? table.elt(0).actualBounds.height : ROW_HEIGHT;

            const rawH = optH || (scroller ? scroller.actualBounds.height : 300);
            // CRITICAL: Use snapped height for capacity so data always fills the visual box
            const snappedH = snapToRow(rawH, rowh);
            const capacity = Math.max(1, Math.floor(snappedH / rowh));

            return {
                capacity: capacity, // How many rows physically fit
                windowSize: capacity + BUFFER * 2, // How many rows to render
                rowHeight: rowh
            };
        }

        /* ---------------- NODE TEMPLATE ---------------- */

        diagram.nodeTemplate =
            $(go.Node, "Spot",
                {
                    selectable: true,
                    resizable: true,
                    resizeObjectName: "SCROLLER",
                    locationObjectName: "BODY",
                    selectionObjectName: "BODY",
                    locationSpot: go.Spot.TopLeft,
                    mouseLeave: (e, node) => {
                        const ra = node.findObject("ROAMING_RIGHT");
                        const la = node.findObject("ROAMING_LEFT");
                        if (ra) ra.visible = false;
                        if (la) la.visible = false;
                    },
                    selectionChanged: (node) => {

                                        (link.toNode && link.toNode.isSelected);

                        });

                    { name: "BODY" },
                    $(go.Shape, "Rectangle", {

                        spot1: go.Spot.TopLeft, spot2: go.Spot.BottomRight
                    }),

                        // HEADER
                        $(go.Panel, "Horizontal",
                            {
                                stretch: go.Stretch.Horizontal,
                                background: "#f0f0f0",
                                padding: new go.Margin(6, 4, 6, 5)
                            },
                            $(go.Shape, {
                                geometryString: "F1 " + ICN_NODE,
                                width: 14, height: 14,
                                fill: "#444", stroke: null,
                                stretch: go.Stretch.Uniform,
                                margin: new go.Margin(0, 8, 0, 0)
                            }),
                            $(go.TextBlock, { font: "bold 13px sans-serif", stroke: "#222" },
                                new go.Binding("text", "key"))
                        ),

                        // SCROLLING TABLE
                        $("ScrollingTable",
                            {
                                name: "SCROLLER",
                                desiredSize: new go.Size(250, 300),
                                minSize: new go.Size(250, 200), // temporary, will override dynamically
                                "TABLE.defaultAlignment": go.Spot.TopLeft
                            },
                            new go.Binding("desiredSize", "size", (s, obj) => {
                                if (s) return go.Size.parse(s);

                                const node = obj.part;
                                const data = node ? node.data : null;
                                if (!data) return new go.Size(250, 300);

                                const items = data.fullItems || [];
                                const count = items.length;
                                const isVirt = data.isVirtualized;

                                // ✅ Dynamic min rows (max 8, else exact count)
                                const minRows = Math.min(8, count);

                                // ✅ Use ROW_HEIGHT (rowh not available here)
                                const minScrollerH = (minRows - 1) * ROW_HEIGHT + 40;

                                if (!isVirt) {
                                    const fitH = count * ROW_HEIGHT;
                                    const exactH = Math.max(fitH, (Math.min(8, count) - 1) * ROW_HEIGHT + 40);
                                    return new go.Size(250, exactH);
                                }

                                // ✅ Virtualized → keep default but respect min
                                const snappedDefaultH = Math.round(300 / ROW_HEIGHT) * ROW_HEIGHT;

                                return new go.Size(
                                    250,
                                    Math.max(snappedDefaultH, minScrollerH)
                                );
                            }).makeTwoWay(go.Size.stringify),
                            new go.Binding("maxSize", "fullItems", (items) => {
                                const count = items ? items.length : 0;
                                const minScrollerH = 85;
                                const exactMax = count * ROW_HEIGHT + 40;
                                return new go.Size(Infinity, Math.max(exactMax, minScrollerH));
                            }),
                            new go.Binding("TABLE.itemArray", "visibleItems"),
                            {
                                "TABLE.itemTemplate":
                                    $(go.Panel, "TableRow",
                                        {
                                            background: "transparent",
                                            stretch: go.Stretch.Horizontal,
                                            minSize: new go.Size(NaN, ROW_HEIGHT),
                                            maxSize: new go.Size(NaN, ROW_HEIGHT),
                                            toLinkable: true,
                                            fromLinkable: true, // Allow drawing directly from the row body
                                            toolTip:
                                                $("ToolTip",
                                                    $(go.TextBlock, { margin: 4, font: "bold 12px sans-serif" },
                                                        new go.Binding("text", "name"))
                                                ),
                                            mouseEnter: (e, row) => {
                                                const node = row.part;
                                                const ra = node.findObject("ROAMING_RIGHT");
                                                const la = node.findObject("ROAMING_LEFT");
                                                if (ra && la) {
                                                    const nodeDocPt = node.getDocumentPoint(go.Spot.TopLeft);
                                                    const rowDocPt = row.getDocumentPoint(go.Spot.Center);
                                                    const nodeH = node.actualBounds.height;

                                                    let yRatio = 0.5;
                                                    if (nodeH > 0) yRatio = (rowDocPt.y - nodeDocPt.y) / nodeH;

                                                    ra.alignment = new go.Spot(1, yRatio, -2, 0); // Re-aligned closer to avoid dead zones
                                                    la.alignment = new go.Spot(0, yRatio, 2, 0);

                                                    const raShape = ra.findObject("RIGHT_ARROW_SHAPE");
                                                    const laShape = la.findObject("LEFT_ARROW_SHAPE");
                                                    if (raShape) raShape.stroke = "black";
                                                    if (laShape) laShape.stroke = "black";

                                                    ra.visible = true;
                                                    la.visible = true;
                                                    node._hoveredRowName = row.data.name;
                                                }
                                            },
                                            mouseLeave: (e, row) => {
                                                if (e.diagram.currentTool instanceof go.LinkingTool) return;
                                                const pt = e.diagram.lastInput.documentPoint;
                                                const node = row.part;
                                                const ra = node.findObject("ROAMING_RIGHT");
                                                const la = node.findObject("ROAMING_LEFT");
                                                const scroller = node.findObject("SCROLLER");

                                                if (ra && ra.getDocumentBounds().containsPoint(pt)) return;
                                                if (la && la.getDocumentBounds().containsPoint(pt)) return;
                                                if (scroller && scroller.getDocumentBounds().containsPoint(pt)) return;

                                                if (ra) ra.visible = false;
                                                if (la) la.visible = false;
                                            }
                                        },
                                        new go.Binding("portId", "name"),
                                        new go.Binding("fromSpot", "", () => go.Spot.Right),
                                        new go.Binding("toSpot", "", () => go.Spot.Left),

                                        $(go.Panel, "Horizontal",
                                            { column: 0, margin: new go.Margin(13, 5, 10, 5) },
                                            new go.Binding("visible", "", (data, obj) => {
                                                const node = obj.part;
                                                if (!node || !node.data) return true;
                                                const nData = node.data;
                                                if (!nData.isVirtualized) return true;

                                                const fullIndex = nData.indexMap.get(data);
                                                const windowStart = nData.startIndex || 0;
                                                const capacity = nData.capacity || 10;
                                                const windowEnd = windowStart + capacity;

                                                return (fullIndex >= windowStart && fullIndex < windowEnd);
                                            }),

                                            $(go.Shape, {
                                                geometryString: "F1 " + ICN_FILTER,
                                                width: 14, height: 14,
                                                stroke: null,
                                                stretch: go.Stretch.Uniform,

                                                    let attrData = obj.data;

                                                    if (node && attrData) {
                                                        const state = globalNodeState.get(node.key);
                                                        if (state) {
                                                            const model = diagram.model;
                                                            model.startTransaction("toggle filter");
                                                            const attrName = attrData.name;
                                                            const filterActive = !state.activeFilters.has(attrName);

                                                            if (filterActive) {
                                                                state.activeFilters.add(attrName);
                                                            } else {
                                                                state.activeFilters.delete(attrName);

                                                            const currentTop = node.data.startIndex + (table ? table.topIndex : 0);
                                                            updateWindow(node, currentTop + BUFFER);

                                                            model.updateTargetBindings(node.data);

                                                            if (table) {
                                                                table.topIndex = Math.max(0, currentTop - node.data.startIndex);
                                                            }

                                                            model.updateTargetBindings(attrData);
                                                            model.commitTransaction("toggle filter");
                                                        }
                                                    }
                                                }
                                            }, new go.Binding("fill", "", (data, obj) => {
                                                let d = data;
                                                let p = obj;
                                                while (!d && p.panel) { p = p.panel; d = p.data; }

                                                const node = obj.part;
                                                const state = node ? globalNodeState.get(node.key) : null;

                                            }, new go.Binding("geometryString", "type", t => "F1 " + (t === "number" ? ICN_NUM : ICN_STR))),

                                                new go.Binding("text", "name"))

                            }
                        ) // close ScrollingTable
                    ) // close Vertical panel
                ), // close Auto panel

                // Roaming Left Port (Incoming)
                $(go.Panel, "Auto", {
                    name: "ROAMING_LEFT",
                    alignmentFocus: go.Spot.Right,
                    visible: false, cursor: "pointer",
                    toLinkable: true, fromLinkable: true, portId: "TEMP_LEFT",
                    background: "transparent",
                    mouseEnter: (e, panel) => {

                    },
                    mouseLeave: (e, panel) => {

                    $(go.Shape, {
                        name: "LEFT_ARROW_SHAPE",
                        geometryString: "M 14 5 L 0 5 M 5 0 L 0 5 L 5 10", // Left arrow with tail
                        stroke: "black", strokeWidth: 2, fill: null,
                        width: 14, height: 10,
                        margin: new go.Margin(5, 10, 5, 0)
                    })
                ),

                // Roaming Right Port (Outgoing)
                $(go.Panel, "Auto", {
                    name: "ROAMING_RIGHT",
                    alignmentFocus: go.Spot.Left,
                    visible: false, cursor: "pointer",
                    fromLinkable: true, portId: "TEMP_RIGHT",
                    background: "transparent",
                    mouseEnter: (e, panel) => {
                        const shape = panel.findObject("RIGHT_ARROW_SHAPE");
                        if (shape) shape.stroke = "#00a1ff";
                    },
                    mouseLeave: (e, panel) => {
                        const shape = panel.findObject("RIGHT_ARROW_SHAPE");
                        if (shape) shape.stroke = "black";
                        if (!(e.diagram.currentTool instanceof go.LinkingTool)) {
                            panel.visible = false;
                            const la = panel.part.findObject("ROAMING_LEFT");
                            if (la) la.visible = false;
                        }
                    }
                },
                    $(go.Shape, {
                        name: "RIGHT_ARROW_SHAPE",
                        geometryString: "M 0 5 L 14 5 M 9 0 L 14 5 L 9 10", // Right arrow with tail
                        stroke: "black", strokeWidth: 2, fill: null,
                        width: 14, height: 10,
                        margin: new go.Margin(5, 0, 5, 10)
                    })
                )
            );

        /* Global listener for scroll updates (opacity sync) */
        diagram.addChangedListener(e => {
            if (e.propertyName === "topIndex" && e.object && e.object.name === "TABLE") {
                const table = e.object;
                const scroller = table.panel;
                if (!scroller) return;
                const node = scroller.part;
                // Defer to the unified customized updater for non-virtualized nodes
                if (node && node.data && !node.data.isVirtualized) {
                    if (scroller._updateScrollBar) scroller._updateScrollBar();
                }
            }
        });

        /* ---------------- LINK TEMPLATE ---------------- */

        class VirtualizedLink extends go.Link {
            computePoints() {
                const fn = this.fromNode;
                const tn = this.toNode;
                
                if (fn && tn) {
                    // Auto-determine left/right based on physical node locations
                    // Uses bounds center to detect which side is shortest
                    const fromX = fn.location.x + (fn.actualBounds.width / 2);
                    const toX = tn.location.x + (tn.actualBounds.width / 2);
                    const isLeft = (fromX > toX);

                    // 1. Calculate fromSpot
                    let fSpot = isLeft ? go.Spot.Left : go.Spot.Right;
                    let fEndLen = isLeft ? 0 : 10;

                    if (fn.data && fn.data.isVirtualized) {
                        const portId = this.fromPortId || (this.data ? this.data.fromPort : null);
                        const port = fn.findPort(portId);
                        if (!port || port === fn) {
                            fEndLen = 0;
                            const full = fn.data.fullItems;
                            const idx = full ? full.findIndex(i => i.name === portId) : -1;
                            const globalTop = fn.data.startIndex + (fn.findObject("TABLE")?.topIndex || 0);
                            const scroller = fn.findObject("SCROLLER");
                            const nodeH = fn.actualBounds.height;
                            
                            if (scroller && nodeH > 0) {
                                const scrollerDocPt = scroller.getDocumentPoint(go.Spot.TopLeft);
                                const nodeDocPt = fn.getDocumentPoint(go.Spot.TopLeft);
                                const scrollerTopY = (scrollerDocPt.y - nodeDocPt.y) / nodeH;
                                const scrollerBottomY = (scrollerDocPt.y + scroller.actualBounds.height - nodeDocPt.y) / nodeH;
                                fSpot = (idx < globalTop) 
                                    ? new go.Spot(isLeft ? 0 : 1, scrollerTopY)
                                    : new go.Spot(isLeft ? 0 : 1, scrollerBottomY);
                            } else {
                                fSpot = (idx < globalTop)
                                    ? (isLeft ? go.Spot.TopLeft : go.Spot.TopRight)
                                    : (isLeft ? go.Spot.BottomLeft : go.Spot.BottomRight);
                            }
                        }
                    }

                    if (!this.fromSpot.equals(fSpot)) this.fromSpot = fSpot;
                    if (this.fromEndSegmentLength !== fEndLen) this.fromEndSegmentLength = fEndLen;

                    // 2. Calculate toSpot
                    const enterRight = isLeft; // if originating from left side, it hits the target's right side
                    let tSpot = enterRight ? go.Spot.Right : go.Spot.Left;
                    
                    if (tn.data && tn.data.isVirtualized) {
                        const portId = this.toPortId || (this.data ? this.data.toPort : null);
                        const port = tn.findPort(portId);
                        if (!port || port === tn) {
                            const full = tn.data.fullItems;
                            const idx = full ? full.findIndex(i => i.name === portId) : -1;
                            const globalTop = tn.data.startIndex + (tn.findObject("TABLE")?.topIndex || 0);
                            const scroller = tn.findObject("SCROLLER");
                            const nodeH = tn.actualBounds.height;
                            
                            if (scroller && nodeH > 0) {
                                const scrollerDocPt = scroller.getDocumentPoint(go.Spot.TopLeft);
                                const nodeDocPt = tn.getDocumentPoint(go.Spot.TopLeft);
                                const scrollerTopY = (scrollerDocPt.y - nodeDocPt.y) / nodeH;
                                const scrollerBottomY = (scrollerDocPt.y + scroller.actualBounds.height - nodeDocPt.y) / nodeH;
                                tSpot = (idx < globalTop)
                                    ? new go.Spot(enterRight ? 1 : 0, scrollerTopY)
                                    : new go.Spot(enterRight ? 1 : 0, scrollerBottomY);
                            } else {
                                tSpot = (idx < globalTop)
                                    ? (enterRight ? go.Spot.TopRight : go.Spot.TopLeft)
                                    : (enterRight ? go.Spot.BottomRight : go.Spot.BottomLeft);
                            }
                        }
                    }

                    if (!this.toSpot.equals(tSpot)) this.toSpot = tSpot;
                }
                
                return super.computePoints();
            }
        }

        diagram.linkTemplate =
            $(VirtualizedLink,
                {
                    selectionChanged: (link) => {
                        const sel = link.isSelected || 
                                    (link.fromNode && link.fromNode.isSelected) || 
                                    (link.toNode && link.toNode.isSelected);
                        link.layerName = sel ? "Foreground" : "";
                    }
                },
                new go.Binding("toEndSegmentLength", "", () => 15),

                $(go.Shape, { strokeWidth: 1, stroke: "#999" }),
                $(go.Shape, { toArrow: "Standard", stroke: null, fill: "#999" }),

                $(go.Panel, "Auto",
                    $(go.Shape, "Rectangle", { fill: "#f4f4f4", stroke: "#ccc" }),
                    $(go.TextBlock, "DimensionDimension", { font: "10px sans-serif", stroke: "#555", margin: 3 })
                )

            );

        /* ---------------- ATTRIBUTE GENERATOR ---------------- */

        function generateAttributes(prefix, count) {
            const arr = [];
            for (let i = 1; i <= count; i++) {
                arr.push({
                    name: prefix + "_col_" + i,
                    type: Math.random() > 0.5 ? "number" : "string",
                    filterActive: Math.random() > 0.9 // Start with 10% enabled
                });
            }
            return arr;
        }

        function updateWindow(node, centerIndex) {
            const nodeData = node.data;
            const full = nodeData.fullItems;
            if (!full) return;

            const visibleMap = new Map();

            if (!nodeData.isVirtualized) {
                // 1. NON-VIRTUALIZED: Simply show all items
                full.forEach(item => visibleMap.set(item, item));
                nodeData.startIndex = 0;
            } else {
                // 2. VIRTUALIZED: Add items within the viewport (plus buffer)
                const metrics = getViewportMetrics(node);
                const { windowSize, capacity } = metrics;
                nodeData.capacity = capacity; // STORE CAPACITY

                let start = centerIndex - BUFFER;
                start = Math.max(0, start);
                let end = start + windowSize;
                end = Math.min(full.length, end);

                for (let i = start; i < end; i++) {
                    const item = full[i];
                    visibleMap.set(item, item);
                }

                // 2b. ALSO ALWAYS ADD ITEMS THAT HAVE CONNECTED LINKS
                node.findLinksConnected().each(link => {
                    const portId = (link.fromNode === node) ? link.fromPortId : link.toPortId;
                    if (portId) {
                        const item = full.find(i => i.name === portId);
                        if (item) visibleMap.set(item, item);
                    }
                });

                // 2c. ALSO ALWAYS ADD ITEMS THAT HAVE ACTIVE FILTERS
                const state = globalNodeState.get(node.key);
                if (state && state.activeFilters) {
                    state.activeFilters.forEach(attrName => {
                        const item = full.find(i => i.name === attrName);
                        if (item) {
                            visibleMap.set(item, item);
                        }
                    });
                }
                nodeData.startIndex = start;
            }

            // 3. Sort based on original position in the master list
            const itemToIndex = nodeData.indexMap;
            const sorted = Array.from(visibleMap.values()).sort((a, b) => {
                return itemToIndex.get(a) - itemToIndex.get(b);
            });

            // Update the window state
            nodeData.visibleItems = sorted;
        }

        /* ---------------- SCROLL HANDLER ---------------- */

        // Override the scrollbar updating function globally if needed,,
        // but it is simpler to just update the thumb height and position manually after native scroll
        function updateVirtualScrollBar(node) {
            const data = node.data;
            const table = node.findObject("TABLE");
            const bar = node.findObject("SCROLLBAR");
            const thumb = node.findObject("THUMB");
            if (!table || !bar || !thumb) return;

            const fullLength = data.fullItems ? data.fullItems.length : 0;
            if (fullLength === 0) return;

            // The current absolute top index of the viewport
            const capacity = data.capacity || getViewportMetrics(node).capacity;
            const globalTopIndex = data.startIndex + table.topIndex;

            // Prevent scrolling below the actual data size
            const maxGlobalTopIndex = Math.max(0, fullLength - capacity);
            const constrainedTopIndex = Math.min(globalTopIndex, maxGlobalTopIndex);

            // Calculate percentage
            let percentage = 0;
            if (maxGlobalTopIndex > 0) {
                percentage = constrainedTopIndex / maxGlobalTopIndex;
            }

            // Height calculation - ratio of visible rows to total rows
            const availH = bar.actualBounds.height;
            const trackH = Math.max(0, availH - (BUTTONS_H || 40));
            const ratio = Math.min(1, capacity / fullLength);
            const thumbH = Math.max(15, ratio * trackH); // min height of 15

            thumb.height = thumbH;

            // Alignment calculation
            thumb.alignment = new go.Spot(0.5, percentage, 0, 0);

            // Update button opacity for global bounds
            const up = bar.findObject("UP");
            const pageup = bar.findObject("PAGEUP");
            const down = bar.findObject("DOWN");
            const pagedown = bar.findObject("PAGEDOWN");

            if (maxGlobalTopIndex === 0) {
                if (up) up.opacity = 0.3;
                if (pageup) pageup.opacity = 0.3;
                if (down) down.opacity = 0.3;
                if (pagedown) pagedown.opacity = 0.3;
                if (thumb) {
                    thumb.opacity = 0.3;
                    thumb.height = Math.max(15, bar.actualBounds.height - BUTTONS_H);
                }
            } else {
                if (thumb) thumb.opacity = 1.0;
                if (up) up.opacity = constrainedTopIndex > 0 ? 1.0 : 0.3;
                if (pageup) pageup.opacity = constrainedTopIndex > 0 ? 1.0 : 0.3;
                if (down) down.opacity = constrainedTopIndex < maxGlobalTopIndex ? 1.0 : 0.3;
                if (pagedown) pagedown.opacity = constrainedTopIndex < maxGlobalTopIndex ? 1.0 : 0.3;
            }
        }

        /* ---------------- VIRTUAL SCROLL HELPER ---------------- */
        function virtualScrollBy(node, delta) {
            const data = node.data;
            const table = node.findObject("TABLE");
            if (!table) return;

            const ra = node.findObject("ROAMING_RIGHT");
            const la = node.findObject("ROAMING_LEFT");
            if (ra) ra.visible = false;
            if (la) la.visible = false;

            // Current global top index
            const currentGlobalIndex = data.startIndex + table.topIndex;
            const targetGlobalIndex = currentGlobalIndex + delta;

            const capacity = data.capacity || getViewportMetrics(node).capacity;
            const maxGlobalIndex = Math.max(0, data.fullItems.length - capacity);
            const constrainedIndex = Math.max(0, Math.min(targetGlobalIndex, maxGlobalIndex));

            if (constrainedIndex === currentGlobalIndex && delta !== 0) return;

            diagram.model.startTransaction("scroll");
            updateWindow(node, constrainedIndex + BUFFER);
            diagram.model.updateTargetBindings(data);
            diagram.model.commitTransaction("scroll");

            // Restore/Update local topIndex to match the global offset
            table.topIndex = Math.max(0, constrainedIndex - data.startIndex);

            updateVirtualScrollBar(node);
            node.invalidateConnectedLinks();
            refreshLinksForNode(node);
        }

        // Re-evaluate link fromSpot/toSpot bindings after a scroll
        function refreshLinksForNode(node) {
            node.findLinksConnected().each(link => {
                diagram.model.updateTargetBindings(link.data);
            });
        }

        function updateNonVirtualScrollBar(node) {
            const scroller = node.findObject("SCROLLER");
            const table = scroller.findObject("TABLE");
            const bar = scroller.findObject("SCROLLBAR");
            if (!table || !bar) return;

            bar.visible = true; // Always visible

            const up = bar.findObject("UP");
            const down = bar.findObject("DOWN");
            const pup = bar.findObject("PAGEUP");
            const pdn = bar.findObject("PAGEDOWN");
            const thumb = bar.findObject("THUMB");

            const contentH = (node.data.fullItems || []).length * ROW_HEIGHT;
            if (contentH <= scroller.actualBounds.height + 5) {
                if (up) up.opacity = 0.3;
                if (down) down.opacity = 0.3;
                if (pup) pup.opacity = 0.3;
                if (pdn) pdn.opacity = 0.3;
                if (thumb) {
                    thumb.opacity = 0.3;
                    thumb.height = Math.max(15, bar.actualBounds.height - BUTTONS_H);
                    thumb.alignment = go.Spot.Top;
                }
            } else {
                if (up) up.opacity = table.topIndex > 0 ? 1.0 : 0.3;
                if (pup) pup.opacity = table.topIndex > 0 ? 1.0 : 0.3;

                const rowh = (table.elements.count > 0 && table.elt(0).actualBounds.height > 5) ? table.elt(0).actualBounds.height : ROW_HEIGHT;
                const maxIdx = Math.max(0, table.rowCount - Math.floor(scroller.actualBounds.height / rowh));

                if (down) down.opacity = table.topIndex < maxIdx ? 1.0 : 0.3;
                if (pdn) pdn.opacity = table.topIndex < maxIdx ? 1.0 : 0.3;

                if (thumb) {
                    thumb.opacity = 1.0;
                    const availH = bar.actualBounds.height;
                    const trackH = Math.max(0, availH - (BUTTONS_H || 40));
                    const visibleRows = Math.floor(scroller.actualBounds.height / rowh);
                    const ratio = Math.min(1, visibleRows / table.rowCount);
                    const thumbH = Math.max(15, Math.max(0, ratio * trackH));
                    thumb.height = thumbH;

                    let percentage = 0;
                    if (maxIdx > 0) percentage = Math.max(0, Math.min(1, table.topIndex / maxIdx));
                    thumb.alignment = new go.Spot(0.5, percentage, 0, 0);
                }
            }
        }

        const toolManager = diagram.toolManager;
        const standardMouseWheel = toolManager.doMouseWheel;
        toolManager.doMouseWheel = function () {
            const e = diagram.lastInput;
            const node = diagram.findPartAt(e.documentPoint);

            if (node && node.part && node.part instanceof go.Node) {
                const scroller = node.part.findObject("SCROLLER");
                if (scroller) {
                    if (node.part.data.isVirtualized) {
                        virtualScrollBy(node.part, e.delta > 0 ? -1 : 1);
                    } else if (scroller._scrollTable) {
                        // Standard ScrollingTable fallback
                        scroller._scrollTable(scroller.findObject("TABLE"), e.delta > 0 ? -1 : 1);
                    }
                    return;
                }
            }
            standardMouseWheel.call(toolManager);
        };

        /* Initial evaluation for scrollbar geometry and button overrides */
        diagram.addDiagramListener("InitialLayoutCompleted", (e) => {
            diagram.updateAllTargetBindings("fullItems");

            diagram.nodes.each(node => {
                const scroller = node.findObject("SCROLLER");
                if (!scroller) return;

                const bar = scroller.findObject("SCROLLBAR");
                if (bar) {
                    // Update RowDefinitions to 5 rows
                    // Row 0: PAGEUP (None)
                    // Row 1: UP (None)
                    // Row 2: THUMB (Vertical Stretch)
                    // Row 3: DOWN (None)
                    // Row 4: PAGEDOWN (None)
                    bar.addRowDefinition(0, { sizing: go.Sizing.None });
                    bar.addRowDefinition(1, { sizing: go.Sizing.None });
                    bar.addRowDefinition(2, { stretch: go.Stretch.Vertical });
                    bar.addRowDefinition(3, { sizing: go.Sizing.None });
                    bar.addRowDefinition(4, { sizing: go.Sizing.None });

                    // Shift existing elements
                    const up = bar.findObject("UP");
                    const thumb = bar.findObject("THUMB");
                    const down = bar.findObject("DOWN");
                    if (up) up.row = 1;
                    if (thumb) { thumb.row = 2; thumb.alignment = go.Spot.Top; }
                    if (down) down.row = 3;
                    // Add PageUp and PageDown buttons
                    if (!bar.findObject("PAGEUP")) {
                        const pageup = go.GraphObject.build("AutoRepeatButton", {
                            name: "PAGEUP", row: 0,
                            height: BUTTON_SIZE,
                            "ButtonBorder.figure": "Rectangle",
                            "ButtonBorder.fill": "transparent",
                            "ButtonBorder.strokeWidth": 0,
                            _buttonFillOver: "rgba(0, 0, 0, .25)",
                            _buttonStrokeOver: null,
                            click: (e, obj) => {
                                e.handled = true;
                                if (node.data.isVirtualized) {
                                    const capacity = node.data.capacity || getViewportMetrics(node).capacity;
                                    virtualScrollBy(node, -(capacity - 2));
                                } else {
                                    const table = scroller.findObject("TABLE");
                                    const tabh = table.actualBounds.height;
                                    const rowh = table.elt(table.topIndex).actualBounds.height;
                                    const pageSize = Math.max(1, Math.floor(tabh / rowh) - 2);
                                    scroller._scrollTable(table, -pageSize);
                                }
                            }
                        }).add($(go.Panel, "Vertical",
                            $(go.Shape, "TriangleUp", { width: 8, height: 4, strokeWidth: 0 }),
                            $(go.Shape, "TriangleUp", { width: 8, height: 4, strokeWidth: 0, margin: new go.Margin(-.5, 0, 0, 0) })
                        ));
                        bar.add(pageup);
                    }

                    if (!bar.findObject("PAGEDOWN")) {
                        const pagedown = go.GraphObject.build("AutoRepeatButton", {
                            name: "PAGEDOWN", row: 4,
                            height: BUTTON_SIZE,
                            "ButtonBorder.figure": "Rectangle",
                            "ButtonBorder.fill": "transparent",
                            "ButtonBorder.strokeWidth": 0,
                            _buttonFillOver: "rgba(0, 0, 0, .25)",
                            _buttonStrokeOver: null,
                            click: (e, obj) => {
                                e.handled = true;
                                if (node.data.isVirtualized) {
                                    const capacity = node.data.capacity || getViewportMetrics(node).capacity;
                                    virtualScrollBy(node, (capacity - 2));
                                } else {
                                    const table = scroller.findObject("TABLE");
                                    const tabh = table.actualBounds.height;
                                    const rowh = table.elt(table.topIndex).actualBounds.height;
                                    const pageSize = Math.max(1, Math.floor(tabh / rowh) - 2);
                                    scroller._scrollTable(table, pageSize);
                                }
                            }
                        }).add($(go.Panel, "Vertical",
                            $(go.Shape, "TriangleDown", { width: 8, height: 4, strokeWidth: 0, margin: new go.Margin(0, 0, -.5, 0) }),
                            $(go.Shape, "TriangleDown", { width: 8, height: 4, strokeWidth: 0 })
                        ));
                        bar.add(pagedown);
                    }
                }

                if (node.data.isVirtualized) {
                    // 1. Force the initial window of data (visibleItems) to be populated for EVERY node
                    diagram.model.startTransaction("initial update");
                    updateWindow(node, 0);
                    diagram.model.updateTargetBindings(node.data);
                    diagram.model.commitTransaction("initial update");

                    // 2. Virtual Scrollbar logic
                    updateVirtualScrollBar(node);

                    const thumb = scroller.findObject("THUMB");
                    const bar = scroller.findObject("SCROLLBAR");
                    const table = scroller.findObject("TABLE");
                    if (!bar || !table) return;

                    // 1. OVERWRITE Internal ScrollingTable logic to use our virtualized versions
                    scroller._updateScrollBar = () => updateVirtualScrollBar(node);
                    scroller._scrollTable = (obj, incr) => virtualScrollBy(node, incr);

                    // 2. LIMIT HEIGHT for virtualized nodes too
                    const full = node.data.fullItems || [];
                    const maxPossibleH = (full.length * ROW_HEIGHT) + 44;
                    scroller.maxSize = new go.Size(NaN, maxPossibleH);
                    if (scroller.height > maxPossibleH) scroller.height = maxPossibleH;

                    // 2. Override thumb dragging logic
                    if (thumb) {
                        thumb.isActionable = true;
                        thumb.actionMove = (ev, thb) => {
                            const local = bar.getLocalPoint(ev.documentPoint);
                            const pageuph = bar.findObject("PAGEUP")?.actualBounds.height || 0;
                            const uph = bar.findObject("UP")?.actualBounds.height || 0;
                            const downh = bar.findObject("DOWN")?.actualBounds.height || 0;
                            const pagedownh = bar.findObject("PAGEDOWN")?.actualBounds.height || 0;

                            const offset = pageuph + uph;
                            const range = bar.actualBounds.height - offset - downh - pagedownh;
                            const ratio = Math.max(0, Math.min(1, (local.y - offset) / range));

                            const metrics = getViewportMetrics(node);
                            const maxTopIndex = Math.max(0, node.data.fullItems.length - metrics.capacity);
                            const targetIdx = Math.round(ratio * maxTopIndex);

                            if (node._lastDragIdx === targetIdx) return;
                            node._lastDragIdx = targetIdx;

                            // Use a single transaction per move frame for both data and visual updates
                            diagram.model.startTransaction("thumb drag");
                            updateWindow(node, targetIdx + BUFFER);
                            table.topIndex = Math.max(0, targetIdx - node.data.startIndex);
                            diagram.model.updateTargetBindings(node.data);
                            updateVirtualScrollBar(node);
                            diagram.model.commitTransaction("thumb drag");

                            node.invalidateConnectedLinks();
                            refreshLinksForNode(node);
                            diagram.requestUpdate();
                        };
                    }

                    // Override bar clicking logic
                    if (bar) {
                        bar.click = (ev, br) => {
                            ev.handled = true;
                            const local = br.getLocalPoint(ev.documentPoint);
                            const pageuph = br.findObject("PAGEUP")?.actualBounds.height || 0;
                            const uph = br.findObject("UP")?.actualBounds.height || 0;
                            const downh = br.findObject("DOWN")?.actualBounds.height || 0;
                            const pagedownh = br.findObject("PAGEDOWN")?.actualBounds.height || 0;

                            const offset = pageuph + uph;
                            const range = br.actualBounds.height - offset - downh - pagedownh;
                            const ratio = Math.max(0, Math.min(1, (local.y - offset) / range));

                            const metrics = getViewportMetrics(node);
                            const maxTopIndex = Math.max(0, node.data.fullItems.length - metrics.capacity);
                            const targetIdx = Math.round(ratio * maxTopIndex);

                            diagram.model.startTransaction("bar click");
                            updateWindow(node, targetIdx + BUFFER);
                            table.topIndex = Math.max(0, targetIdx - node.data.startIndex);
                            diagram.model.updateTargetBindings(node.data);
                            updateVirtualScrollBar(node);
                            diagram.model.commitTransaction("bar click");
                            node.invalidateConnectedLinks();
                            refreshLinksForNode(node);
                        };
                    }

                    // Override button behavior
                    const pageup = scroller.findObject("PAGEUP");
                    if (pageup) {
                        pageup.click = (ev) => {
                            ev.handled = true;
                            const capacity = node.data.capacity || getViewportMetrics(node).capacity;
                            virtualScrollBy(node, -(capacity - 2));
                        };
                    }
                    const up = scroller.findObject("UP");
                    if (up) {
                        up.click = (ev) => { ev.handled = true; virtualScrollBy(node, -1); }
                        up.height = BUTTON_SIZE;
                        up.minSize = new go.Size(NaN, BUTTON_SIZE);
                        up.stretch = go.Stretch.Horizontal;
                    }
                    const down = scroller.findObject("DOWN");
                    if (down) {
                        down.click = (ev) => { ev.handled = true; virtualScrollBy(node, 1); }
                        down.height = BUTTON_SIZE;
                        down.minSize = new go.Size(NaN, BUTTON_SIZE);
                        down.stretch = go.Stretch.Horizontal;
                    }
                    const pagedown = scroller.findObject("PAGEDOWN");
                    if (pagedown) {
                        pagedown.click = (ev) => {
                            ev.handled = true;
                            const capacity = node.data.capacity || getViewportMetrics(node).capacity;
                            virtualScrollBy(node, (capacity - 2));
                        };
                    }

                } else {
                    // NON-VIRTUALIZED NODES: always show scrollbar, even if all items fit
                    scroller._updateScrollBar = () => updateNonVirtualScrollBar(node);
                    const up = scroller.findObject("UP");
                    const down = scroller.findObject("DOWN");

                    if (up) {
                        up.height = BUTTON_SIZE;
                        up.minSize = new go.Size(NaN, BUTTON_SIZE);
                        up.stretch = go.Stretch.Horizontal;
                    }

                    if (down) {
                        down.height = BUTTON_SIZE;
                        down.minSize = new go.Size(NaN, BUTTON_SIZE);
                        down.stretch = go.Stretch.Horizontal;
                    }

                    const table = scroller.findObject("TABLE");
                    const full = node.data.fullItems || [];
                    if (table) {
                        const contentH = full.length * ROW_HEIGHT;
                        const minScrollerH = 85;
                        const targetMaxH = Math.max(contentH, minScrollerH);

                        scroller.maxSize = new go.Size(NaN, targetMaxH);
                        // Make sure first layout has appropriate bounds
                        if (scroller.height > targetMaxH) {
                            scroller.height = targetMaxH;
                        } else if (contentH <= minScrollerH && scroller.height < minScrollerH) {
                            scroller.height = minScrollerH;
                        }

                        updateNonVirtualScrollBar(node);
                    }
                }
            });

            // NOW DETECT ROW_HEIGHT and BUTTONS_H after injection and initial layout of new elements
            const firstNodeAfter = diagram.nodes.first();
            if (firstNodeAfter) {
                const table = firstNodeAfter.findObject("TABLE");
                const scroller = firstNodeAfter.findObject("SCROLLER");
                if (table && table.elements.count > 0) {
                    const firstRow = table.elt(0);
                    // Force a layout pass if necessary to get bounds
                    if (firstRow && firstRow.actualBounds.height > 5) {
                        ROW_HEIGHT = firstRow.actualBounds.height;
                    } else if (table.actualBounds.height > 0) {
                        ROW_HEIGHT = table.actualBounds.height / table.rowCount;
                    }
                }
                if (scroller) {
                    const pup = scroller.findObject("PAGEUP");
                    const up = scroller.findObject("UP");
                    const dn = scroller.findObject("DOWN");
                    const pdn = scroller.findObject("PAGEDOWN");
                    if (pup && pup.actualBounds.height > 0) {
                        BUTTONS_H = pup.actualBounds.height +
                            (up ? up.actualBounds.height : 0) +
                            (dn ? dn.actualBounds.height : 0) +
                            (pdn ? pdn.actualBounds.height : 0);
                    }
                }

                // Apply maxSize to all nodes now that we have accurate metrics
                diagram.nodes.each(node => {
                    const s = node.findObject("SCROLLER");
                    const t = node.findObject("TABLE");
                    const b = node.findObject("SCROLLBAR");
                    if (s && t) {
                        const items = node.data.fullItems || [];
                        const rowh = (t.elements.count > 0 && t.elt(0).actualBounds.height > 5) ? t.elt(0).actualBounds.height : ROW_HEIGHT;
                        const minScrollerH = 85;
                        const maxH = Math.max(items.length * rowh, minScrollerH);
                        s.maxSize = new go.Size(NaN, maxH);
                        if (s.height > maxH) s.height = maxH;
                    }
                });
            }

            diagram.model.updateTargetBindings();

            diagram.nodes.each(node => {
                const scroller = node.findObject("SCROLLER");
                const table = node.findObject("TABLE");
                if (!scroller || !table) return;

                const rowh = (table.elements.count > 0 && table.elt(0).actualBounds.height > 5)
                    ? table.elt(0).actualBounds.height
                    : ROW_HEIGHT;

                const total = node.data.fullItems ? node.data.fullItems.length : 0;
                const minRows = Math.min(8, total);

                const minHeight = (minRows - 1) * rowh + 40;
                scroller.minSize = new go.Size(250, minHeight);
            });

            // DEFERRED: Re-measure after GoJS fully renders buttons and rows
            setTimeout(() => {
                // 1. Re-detect accurate ROW_HEIGHT and BUTTONS_H now that everything is painted
                const firstNode = diagram.nodes.first();
                if (firstNode) {
                    const t = firstNode.findObject("TABLE");
                    const s = firstNode.findObject("SCROLLER");
                    if (t && t.elements.count > 0 && t.elt(0).actualBounds.height > 5) {
                        ROW_HEIGHT = t.elt(0).actualBounds.height;
                    }
                    if (s) {
                        const pup = s.findObject("PAGEUP");
                        const up = s.findObject("UP");
                        const dn = s.findObject("DOWN");
                        const pdn = s.findObject("PAGEDOWN");
                        const bh = (pup ? pup.actualBounds.height : 0)
                            + (up ? up.actualBounds.height : 0)
                            + (dn ? dn.actualBounds.height : 0)
                            + (pdn ? pdn.actualBounds.height : 0);
                        if (bh > 0) BUTTONS_H = bh;
                    }
                }

                // 2. Re-apply correct desiredSize and maxSize for non-virtualized nodes
                diagram.nodes.each(node => {
                    if (node.data.isVirtualized) return;
                    const scroller = node.findObject("SCROLLER");
                    const table = node.findObject("TABLE");
                    if (!scroller) return;

                    const count = (node.data.fullItems || []).length;
                    const rowh = (table && table.elements.count > 0 && table.elt(0).actualBounds.height > 5)
                        ? table.elt(0).actualBounds.height : ROW_HEIGHT;

                    const fitH = count * rowh;
                    const minScrollerH = 85;

                    // maxSize = exactly the content, no extra
                    const exactMax = fitH;

                    // desiredSize = exactly fit all rows (capped at exactMax)
                    const exactH = count <= 8
                        ? Math.max(fitH, minScrollerH)
                        : Math.max(Math.round(300 / rowh) * rowh, minScrollerH);

                    scroller.maxSize = new go.Size(Infinity, Math.max(exactMax, minScrollerH));
                    scroller.desiredSize = new go.Size(250, Math.min(exactH, exactMax));
                    scroller.minSize = new go.Size(250, Math.min(fitH, Math.min(8, count) * rowh));
                    node.ensureBounds();

                    if (scroller._updateScrollBar) scroller._updateScrollBar();
                });

                diagram.requestUpdate();

                diagram.nodes.each(node => {
                    const scroller = node.findObject("SCROLLER");
                    if (scroller && scroller._updateScrollBar) {
                        scroller._updateScrollBar();
                    }
                });

            }, 0);
        });

        /* ---------------- RESIZE HANDLER ---------------- */

        diagram.addDiagramListener("PartResized", (e) => {
            const obj = e.subject; // the SCROLLER
            if (obj.name === "SCROLLER") {
                const node = obj.part;
                const table = obj.findObject("TABLE");
                if (!node || !table) return;

                diagram.model.startTransaction("resize scroll sync");

                const rowh = (table && table.elements.count > 0 && table.elt(0).actualBounds.height > 5)
                    ? table.elt(0).actualBounds.height
                    : ROW_HEIGHT;

                const total = node.data.fullItems ? node.data.fullItems.length : 0;
                const minRows = Math.min(8, total);

                obj.minSize = new go.Size(250, (minRows - 1) * rowh + 40);

                // 1. FORCE STRICT SNAPPING on the final result + CAP to content
                const currentH = obj.actualBounds.height;
                const fullLength = (node.data.fullItems ? node.data.fullItems.length : 0);
                const minScrollerH = 85;
                const targetMaxH = Math.max(fullLength * rowh, minScrollerH);

                const snappedH = Math.max(
                    minScrollerH,
                    Math.min(snapToRow(currentH, rowh), targetMaxH)
                );
                if (Math.abs(obj.height - snappedH) > 0.1) {
                    obj.height = snappedH;
                    node.ensureBounds();
                }

                if (node.data.isVirtualized) {
                    const metrics = getViewportMetrics(node, obj.actualBounds.height);
                    const currentTop = node.data.startIndex + table.topIndex;
                    const maxTop = Math.max(0, node.data.fullItems.length - metrics.capacity);

                    // Final docking check: only follow bottom if already scrolled there
                    const isAtBottom = (currentTop > 0 && currentTop >= (node.data.prevMaxIndex || 0) - 1);
                    let targetTop = Math.min(currentTop, maxTop);
                    if (isAtBottom) targetTop = maxTop;

                    node.data.prevMaxIndex = maxTop;

                    updateWindow(node, targetTop + BUFFER);
                    diagram.model.updateTargetBindings(node.data);
                    table.topIndex = Math.max(0, targetTop - node.data.startIndex);
                    updateVirtualScrollBar(node);
                } else if (table) {
                    const maxIdx = Math.max(0, table.rowCount - Math.floor(obj.actualBounds.height / rowh));
                    if (table.topIndex > maxIdx) table.topIndex = maxIdx;
                    if (obj._updateScrollBar) obj._updateScrollBar(table);
                }

                node.invalidateConnectedLinks();
                diagram.model.setDataProperty(node.data, "size", go.Size.stringify(obj.actualBounds.size));
                diagram.model.commitTransaction("resize scroll sync");

                // Dual-pass sync to eliminate lag
                if (node.data.isVirtualized) {
                    const latestMetrics = getViewportMetrics(node, obj.actualBounds.height);
                    const currentAbsTop = node.data.startIndex + table.topIndex;
                    const targetAbsTop = Math.min(currentAbsTop, Math.max(0, node.data.fullItems.length - latestMetrics.capacity));
                    updateWindow(node, targetAbsTop + BUFFER);
                    diagram.model.updateTargetBindings(node.data);
                    table.topIndex = Math.max(0, targetAbsTop - node.data.startIndex);
                    updateVirtualScrollBar(node);
                    diagram.requestUpdate();
                }
            }
        });


        /* ---------------- MODEL ---------------- */

        const linkDataArray = [
            // 1 outgoing link per source node → Inventory can have multiple incoming
            { from: "Products", fromPort: "products_col_5", to: "Inventory", toPort: "inv_col_10", text: "DimensionDimension" },
            { from: "Suppliers", fromPort: "suppliers_col_10", to: "Inventory", toPort: "inv_col_20", text: "DimensionDimension" },
            { from: "Store", fromPort: "store_col_15", to: "Inventory", toPort: "inv_col_30", text: "DimensionDimension" },
            { from: "NewNode", fromPort: "newnode_col_2", to: "Inventory", toPort: "inv_col_40", text: "DimensionDimension" }
        ];

        /* Helper to find all attributes that have links for a given node */
        function buildLinkedSet(nodeKey) {
            const set = new Set();
            linkDataArray.forEach(link => {
                if (link.from === nodeKey) set.add(link.fromPort);
                if (link.to === nodeKey) set.add(link.toPort);
            });
            return set;
        }


        /* ---------------- DATA STORE ---------------- */
        const globalNodeState = new Map(); // nodeKey -> { fullItems: [], activeFilters: Set }

        function exportState() {
            const exported = {};
            globalNodeState.forEach((state, key) => {
                exported[key] = Array.from(state.activeFilters);
            });
            console.log("Current Filter State:", exported);
            alert("State exported to browser console!\nCheck console for details.");
        }

        const nodeDataArray = [

            {
                key: "Products",
                fullItems: generateAttributes("products", 3000),
                visibleItems: [],
                startIndex: 0,
                loc: "0 0"
            },
            {
                key: "Suppliers",
                fullItems: generateAttributes("suppliers", 1500),
                visibleItems: [],
                startIndex: 0,
                loc: "0 350"
            },
            {
                key: "Store",
                loc: "0 700",
                fullItems: generateAttributes("store", 50),
                visibleItems: [],
                startIndex: 0
            },
            {
                key: "NewNode",
                loc: "0 1050",
                fullItems: generateAttributes("newnode", 4), // change count as needed
                visibleItems: [],
                startIndex: 0
            },
            {
                key: "Inventory",
                loc: "500 350",
                fullItems: generateAttributes("inv", 3000)
            }
        ];

        // Initialize Data Store and syncing nodeData
        nodeDataArray.forEach(n => {
            const full = n.fullItems || [];

            // Register in global memory store
            const nodeState = {
                fullItems: full,
                activeFilters: new Set()
            };

            // INITIAL FILTERS:
            // 1. Common: Rows 6 and 7 (indices 5, 6) for all nodes
            [5, 6].forEach(idx => {
                if (full[idx]) nodeState.activeFilters.add(full[idx].name);
            });

            // 2. Node-specific variety
            const variety = {
                "Products": [0, 10, 20],
                "Suppliers": [2, 12, 22],
                "Store": [4, 14, 24],
                "NewNode": [1]
            };
            (variety[n.key] || []).forEach(idx => {
                if (full[idx]) nodeState.activeFilters.add(full[idx].name);
            });

            globalNodeState.set(n.key, nodeState);


            n.linkedAttrs = buildLinkedSet(n.key);

            // THRESHOLD: Only virtualize if row count > 200
            n.isVirtualized = (full.length > 200);

            // Initial population of visibleItems
            const visibleMap = new Map();
            if (n.isVirtualized) {
                // Initial window for large tables
                const count = Math.min(full.length, 60);
                for (let i = 0; i < count; i++) {
                    visibleMap.set(full[i], full[i]);
                }
            } else {
                // Full set for small tables
                full.forEach(i => visibleMap.set(i, i));
            }

            // CACHE: Name-independent sorting using master indices
            n.indexMap = new Map();
            full.forEach((item, idx) => n.indexMap.set(item, idx));

            const sorted = Array.from(visibleMap.values()).sort((a, b) => {
                return n.indexMap.get(a) - n.indexMap.get(b);
            });

            const initialCapacity = n.isVirtualized ? 10 : full.length;
            n.prevMaxIndex = Math.max(0, full.length - initialCapacity);
            n.startIndex = 0;
            n.visibleItems = sorted;
        });

        diagram.model = new go.GraphLinksModel({
            linkFromPortIdProperty: "fromPort",
            linkToPortIdProperty: "toPort",
            nodeDataArray: nodeDataArray,
            linkDataArray: linkDataArray
        });

        // Ensure newly drawn links match the hardcoded styling and attributes
        diagram.toolManager.linkingTool.archetypeLinkData = { text: "DimensionDimension" };

        // Ensure links are only drawn forward from a starting node to a destination node, never the opposite!
        diagram.toolManager.linkingTool.direction = go.LinkingTool.ForwardsOnly;

        // Disable the magenta highlight that appears around target ports while dragging
        diagram.toolManager.linkingTool.portTargeted = function (realnode, realport, tempnode, tempport, toend) { };
        diagram.toolManager.relinkingTool.portTargeted = function (realnode, realport, tempnode, tempport, toend) { };

        // Disable the magenta square attached to the mouse cursor while drawing a new link
        diagram.toolManager.linkingTool.temporaryFromNode =
            $(go.Node,
                $(go.Shape, "Rectangle", { portId: "", fill: null, stroke: null, width: 1, height: 1 })
            );
        diagram.toolManager.linkingTool.temporaryToNode =
            $(go.Node,
                $(go.Shape, "Rectangle", { portId: "", fill: null, stroke: null, width: 1, height: 1 })
            );

        // Inject the VirtualizedLink template as the temporary dragging link
        diagram.toolManager.linkingTool.temporaryLink =
            $(VirtualizedLink,
                { layerName: "Tool" },
                $(go.Shape, { isPanelMain: true, stroke: "#4a90e2", strokeWidth: 2 })
            );

        const baseLinkingToolActivate = diagram.toolManager.linkingTool.doActivate;
        diagram.toolManager.linkingTool.doActivate = function () {
            baseLinkingToolActivate.call(this);

            if (this.originalFromPort && this.originalFromPort.portId === "TEMP_RIGHT") {
                const node = this.originalFromNode;
                const rowName = node._hoveredRowName;
                const rowPort = node.findPort(rowName);
                if (rowPort) {
                    rowPort.fromLinkable = true; // Temporarily allow row to act as source for validation
                    this._tempMadeFromLinkable = rowPort;

                    this.originalFromPort = rowPort;
                    if (this.temporaryLink) {
                        this.temporaryLink.fromNode = node;
                        this.temporaryLink.fromPortId = rowName;
                        this.temporaryLink.invalidateRoute();
                    }
                }
                const ra = node.findObject("ROAMING_RIGHT");
                const la = node.findObject("ROAMING_LEFT");
                if (ra) ra.visible = false;
                if (la) la.visible = false;
            } else if (this.originalFromPort && this.originalFromPort.portId === "TEMP_LEFT") {
                const node = this.originalFromNode;
                const rowName = node._hoveredRowName;
                const rowPort = node.findPort(rowName);
                if (rowPort) {
                    rowPort.fromLinkable = true;
                    this._tempMadeFromLinkable = rowPort;

                    this.originalFromPort = rowPort;
                    if (this.temporaryLink) {
                        this.temporaryLink.fromNode = node;
                        this.temporaryLink.fromPortId = rowName;
                        this.temporaryLink.invalidateRoute();
                    }
                }
                const ra = node.findObject("ROAMING_RIGHT");
                const la = node.findObject("ROAMING_LEFT");
                if (ra) ra.visible = false;
                if (la) la.visible = false;
            } else if (this.originalFromPort && this.originalFromPort.type === go.Panel.TableRow) {
                // Drag started directly from the row text/body
                if (this.temporaryLink) {
                    this.temporaryLink.invalidateRoute();
                }

                const node = this.originalFromNode;
                const ra = node.findObject("ROAMING_RIGHT");
                const la = node.findObject("ROAMING_LEFT");
                if (ra) ra.visible = false;
                if (la) la.visible = false;
            }
        };

        const baseLinkingToolDeactivate = diagram.toolManager.linkingTool.doDeactivate;
        diagram.toolManager.linkingTool.doDeactivate = function () {
            if (this._tempMadeFromLinkable) {
                this._tempMadeFromLinkable.fromLinkable = false;
                this._tempMadeFromLinkable = null;
            }
            if (this._tempMadeToLinkable) {
                // We leave toLinkable as true on TableRow natively, but cleaning up safely
                this._tempMadeToLinkable = null;
            }
            baseLinkingToolDeactivate.call(this);
        };

        diagram.addDiagramListener("LinkDrawn", (e) => {
            const link = e.subject;
            const model = diagram.model;

            if (link.data.fromPort === "TEMP_RIGHT" || link.data.fromPort === "TEMP_LEFT") {
                const name = link.fromNode._hoveredRowName;
                if (name) model.setFromPortIdForLinkData(link.data, name);
            }
            if (link.data.toPort === "TEMP_RIGHT" || link.data.toPort === "TEMP_LEFT") {
                const name = link.toNode._hoveredRowName;
                if (name) model.setToPortIdForLinkData(link.data, name);
            }
        });

        diagram.addDiagramListener("LinkRelinked", (e) => {
            const link = e.subject;
            const model = diagram.model;
            // For simplicity, we ignore relinking changing direction natively here, but standard port fixing applies.
            if (link.data.fromPort === "TEMP_RIGHT" || link.data.fromPort === "TEMP_LEFT") {
                const name = link.fromNode._hoveredRowName;
                if (name) model.setFromPortIdForLinkData(link.data, name);
            }
            if (link.data.toPort === "TEMP_RIGHT" || link.data.toPort === "TEMP_LEFT") {
                const name = link.toNode._hoveredRowName;
                if (name) model.setToPortIdForLinkData(link.data, name);
            }
        });

    </script>
